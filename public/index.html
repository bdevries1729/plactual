<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plactual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0c0e14;
        --surface: #161924;
        --surface-2: #1e2130;
        --border: #252840;
        --accent: #3b82f6;
        --accent-dim: rgba(59, 130, 246, 0.1);
        --success: #10b981;
        --success-dim: rgba(16, 185, 129, 0.1);
        --danger: #f43f5e;
        --danger-dim: rgba(244, 63, 94, 0.1);
        --warning: #f59e0b;
        --text: #e2e8f0;
        --muted: #5a6480;
        --radius: 10px;
        --mono: 'JetBrains Mono', monospace;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 16px 80px;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        width: 100%;
        max-width: 640px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 11px;
        margin-bottom: 32px;
      }

      .logo {
        width: 34px;
        height: 34px;
        background: var(--accent-dim);
        border: 1px solid rgba(59, 130, 246, 0.22);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        flex-shrink: 0;
      }

      h1 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.2px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        margin-left: auto;
        flex-shrink: 0;
        transition:
          background 0.4s,
          box-shadow 0.4s;
      }

      .status-dot.ok {
        background: var(--success);
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.18);
      }

      .status-dot.warning {
        background: var(--warning);
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18);
      }

      /* ── Stat cards ── */
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 15px 16px;
      }

      .stat-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        color: var(--muted);
        margin-bottom: 9px;
      }

      .stat-value {
        font-family: var(--mono);
        font-size: 22px;
        font-weight: 500;
        line-height: 1;
      }

      .stat-sub {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-top: 5px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .badge {
        display: inline-block;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .badge.sandbox {
        background: rgba(245, 158, 11, 0.15);
        color: var(--warning);
        border: 1px solid rgba(245, 158, 11, 0.25);
      }

      .badge.production {
        background: var(--success-dim);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.25);
      }

      /* ── Section header ── */
      .section-header {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }

      .section-title {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        color: var(--muted);
      }

      /* ── Accounts list ── */
      .accounts {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 16px;
      }

      .institution-group {
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .institution-header {
        padding: 10px 15px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        background: var(--surface-2);
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }

      .account-row {
        display: flex;
        align-items: center;
        padding: 13px 15px;
        gap: 12px;
        border-bottom: 1px solid var(--border);
        transition: background 0.12s;
      }

      .account-row:last-child {
        border-bottom: none;
      }

      .account-row:hover {
        background: var(--surface-2);
      }

      .account-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: var(--accent-dim);
        border: 1px solid rgba(59, 130, 246, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
      }

      .account-info {
        flex: 1;
        min-width: 0;
      }

      .account-name {
        font-size: 14px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .account-id {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .toggle {
        position: relative;
        display: inline-block;
        width: 32px;
        height: 18px;
        flex-shrink: 0;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--surface-2);
        border: 1px solid var(--border);
        transition: 0.2s;
        border-radius: 18px;
      }

      .slider:before {
        position: absolute;
        content: '';
        height: 12px;
        width: 12px;
        left: 2px;
        bottom: 2px;
        background-color: var(--muted);
        transition: 0.2s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: var(--accent-dim);
        border-color: rgba(59, 130, 246, 0.4);
      }

      input:checked + .slider:before {
        transform: translateX(14px);
        background-color: var(--accent);
      }

      input:disabled + .slider {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .empty-state {
        padding: 36px 20px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .empty-state .empty-hint {
        font-size: 12px;
        margin-top: 5px;
        color: var(--muted);
        opacity: 0.7;
      }

      /* ── Skeleton loader ── */
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--surface) 25%,
          var(--surface-2) 50%,
          var(--surface) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 4px;
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }

        100% {
          background-position: -200% 0;
        }
      }

      /* ── Buttons ── */
      .actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        flex: 1;
        padding: 10px 18px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.14s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        letter-spacing: -0.1px;
      }

      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        pointer-events: none;
      }

      .icon-btn {
        background: transparent;
        border: none;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px;
        border-radius: 6px;
        margin-left: 6px;
        transition:
          color 0.15s,
          background 0.15s;
      }

      .icon-btn:hover:not(:disabled) {
        color: var(--text);
        background: var(--surface-2);
      }

      .icon-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover:not(:disabled) {
        background: #2563eb;
      }

      .btn-secondary {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover:not(:disabled) {
        border-color: rgba(59, 130, 246, 0.4);
        color: var(--accent);
      }

      /* ── Spinner ── */
      .spinner {
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-top-color: currentColor;
        border-radius: 50%;
        animation: spin 0.55s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Sync log ── */
      .sync-log {
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--radius);
        overflow: hidden;
        max-height: 0;
        transition:
          max-height 0.3s ease,
          margin-top 0.3s ease,
          border-color 0.3s ease,
          background-color 0.3s ease;
        margin-top: 0;
      }

      .sync-log.open {
        background: var(--surface);
        border-color: var(--border);
        max-height: 220px;
        margin-top: 12px;
      }

      .sync-log-inner {
        padding: 14px 16px;
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--muted);
        line-height: 1.8;
        overflow-y: auto;
        max-height: 220px;
        white-space: pre-wrap;
      }

      .log-ok {
        color: var(--success);
      }

      .log-err {
        color: var(--danger);
      }

      .log-dim {
        color: var(--muted);
      }

      /* ── Toast ── */
      #toast-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 9999;
        pointer-events: none;
      }

      .toast {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 11px 15px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 9px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        animation: toastIn 0.18s ease;
        max-width: 300px;
        pointer-events: all;
      }

      .toast.success {
        border-color: rgba(16, 185, 129, 0.3);
      }

      .toast.error {
        border-color: rgba(244, 63, 94, 0.3);
      }

      .toast-icon {
        font-size: 14px;
        flex-shrink: 0;
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes toastOut {
        to {
          opacity: 0;
          transform: translateY(10px);
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="logo">⬡</div>
        <h1>Plactual</h1>
        <div class="status-dot" id="status-dot" title="Server status"></div>
      </header>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Institutions</div>
          <div class="stat-value" id="stat-count">
            <div class="skeleton" style="width: 28px; height: 22px; margin-bottom: 6px"></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Environment</div>
          <div id="stat-env">
            <div class="skeleton" style="width: 68px; height: 20px"></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Auto-Sync</div>
          <div class="stat-sub" id="stat-cron" style="font-size: 13px">
            <div class="skeleton" style="width: 80px; height: 14px"></div>
          </div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-title">Linked Accounts</span>
        <button class="icon-btn" id="refresh-btn" disabled title="Refresh Accounts">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
        <span
          id="sync-header-label"
          style="
            display: none;
            margin-left: auto;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            color: var(--muted);
          "
          >Sync to Actual</span
        >
      </div>

      <div class="accounts" id="accounts-list">
        <div class="institution-group">
          <div class="institution-header">
            <div class="skeleton" style="width: 80px; height: 13px"></div>
          </div>
          <div
            style="
              padding: 13px 15px;
              border-bottom: 1px solid var(--border);
              display: flex;
              gap: 12px;
              align-items: center;
            "
          >
            <div
              class="skeleton"
              style="width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0"
            ></div>
            <div style="flex: 1">
              <div class="skeleton" style="width: 55%; height: 13px; margin-bottom: 6px"></div>
              <div class="skeleton" style="width: 38%; height: 10px"></div>
            </div>
          </div>
          <div style="padding: 13px 15px; display: flex; gap: 12px; align-items: center">
            <div
              class="skeleton"
              style="width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0"
            ></div>
            <div style="flex: 1">
              <div class="skeleton" style="width: 48%; height: 13px; margin-bottom: 6px"></div>
              <div class="skeleton" style="width: 34%; height: 10px"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="link-btn" disabled>
          <span id="link-btn-text">Link Institution</span>
        </button>
        <button class="btn btn-secondary" id="sync-btn" disabled>
          <span id="sync-btn-text">Sync Now</span>
        </button>
      </div>

      <div class="sync-log" id="sync-log">
        <div class="sync-log-inner" id="sync-log-inner"></div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <script>
      let plaidHandler = null;
      let previousServerState = null;
      let previousServicesState = { plaid: null, actual: null };

      // ── Toasts ──────────────────────────────────────────────────────────
      function showToast(message, type = 'info') {
        const icons = { success: '✓', error: '✕', info: '·' };
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerHTML = `<span class="toast-icon">${icons[type] || icons.info}</span><span>${message}</span>`;
        document.getElementById('toast-container').appendChild(el);
        setTimeout(() => {
          el.style.animation = 'toastOut 0.2s ease forwards';
          el.addEventListener('animationend', () => el.remove());
        }, 4000);
      }

      // ── Status ───────────────────────────────────────────────────────────
      async function loadStatus() {
        try {
          const res = await fetch('/api/status');
          if (!res.ok) throw new Error();
          const data = await res.json();

          document.getElementById('stat-count').textContent = data.items;
          document.getElementById('stat-env').innerHTML =
            `<span class="badge ${data.plaid_env}">${data.plaid_env}</span>`;
          document.getElementById('stat-cron').innerHTML =
            `<span style="font-family:var(--mono);font-size:12px;color:var(--text)">${data.cron}</span>`;

          const sPlaid = data.services?.plaid;
          const sActual = data.services?.actual;

          if (previousServicesState.plaid !== null && previousServicesState.plaid !== sPlaid) {
            showToast(`Plaid API is now ${sPlaid}`, sPlaid === 'up' ? 'success' : 'error');
          }
          if (previousServicesState.actual !== null && previousServicesState.actual !== sActual) {
            showToast(
              `Actual Budget server is now ${sActual}`,
              sActual === 'up' ? 'success' : 'error'
            );
          }
          previousServicesState = { plaid: sPlaid, actual: sActual };

          const dot = document.getElementById('status-dot');
          if (sPlaid === 'down' || sActual === 'down') {
            dot.className = 'status-dot warning';
            dot.title = `Plaid: ${sPlaid}, Actual: ${sActual}`;
          } else {
            dot.className = 'status-dot ok';
            dot.title = 'All systems operational';
          }

          if (previousServerState === 'down') {
            showToast('Server connection restored', 'success');
          }
          previousServerState = 'up';
        } catch {
          const dot = document.getElementById('status-dot');
          dot.className = 'status-dot';
          dot.title = 'Server offline';
          if (previousServerState !== 'down') {
            showToast('Cannot reach the server', 'error');
            previousServerState = 'down';
          }
        }
      }

      // ── Account list ─────────────────────────────────────────────────────
      async function loadAccounts() {
        try {
          const res = await fetch('/api/mappings');
          const list = await res.json();
          const container = document.getElementById('accounts-list');

          const syncHeaderLabel = document.getElementById('sync-header-label');

          if (!list.length) {
            if (syncHeaderLabel) syncHeaderLabel.style.display = 'none';
            container.innerHTML = `
            <div class="empty-state">
              No accounts linked yet.
              <div class="empty-hint">Click "Link Institution" to connect your first bank.</div>
            </div>`;
            return;
          }

          if (syncHeaderLabel) syncHeaderLabel.style.display = 'block';

          const grouped = list.reduce((acc, m) => {
            if (!acc[m.item_id]) acc[m.item_id] = { name: m.institution_name, items: [] };
            acc[m.item_id].items.push(m);
            return acc;
          }, {});

          container.innerHTML = Object.entries(grouped)
            .map(
              ([itemId, group]) => `
          <div class="institution-group" id="group-${itemId}">
            <div class="institution-header">
              ${escHtml(group.name)} <span class="badge" id="badge-${itemId}" style="margin-left: 8px; background: var(--surface); color: var(--muted); border-color: var(--border);">${group.items.length} account${group.items.length !== 1 ? 's' : ''}</span>
            </div>
            ${group.items
              .map(
                (m) => `
            <div class="account-row" id="row-${m.plaid_account_id}">
              <div class="account-icon">🏦</div>
              <div class="account-info">
                <div class="account-name">${escHtml(m.account_name)}</div>
                <div class="account-id">${escHtml(m.plaid_account_id)}</div>
              </div>
              <label class="toggle" title="Toggle sync to Actual">
                <input type="checkbox" ${m.sync ? 'checked' : ''} onchange="toggleSync('${m.plaid_account_id}', this)">
                <span class="slider"></span>
              </label>
            </div>`
              )
              .join('')}
          </div>`
            )
            .join('');
        } catch {
          showToast('Could not load accounts', 'error');
        }
      }

      // ── Toggle Sync ───────────────────────────────────────────────────
      async function toggleSync(plaidAccountId, inputEl) {
        const newValue = inputEl.checked;
        inputEl.disabled = true;
        try {
          const res = await fetch(`/api/mappings/${plaidAccountId}/sync`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sync: newValue }),
          });
          if (!res.ok) throw new Error();
          showToast(`Sync ${newValue ? 'enabled' : 'disabled'}`, 'success');
        } catch {
          showToast('Failed to update sync setting', 'error');
          inputEl.checked = !newValue;
        } finally {
          inputEl.disabled = false;
        }
      }

      // ── Plaid Link ───────────────────────────────────────────────────────
      async function initPlaid() {
        try {
          const res = await fetch('/api/create_link_token', { method: 'POST' });
          if (!res.ok) throw new Error('Could not create link token');
          const { link_token } = await res.json();

          plaidHandler = Plaid.create({
            token: link_token,
            onSuccess: async (publicToken) => {
              setBtnState('link', 'loading', 'Linking…');
              try {
                const r = await fetch('/api/exchange_public_token', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ public_token: publicToken }),
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || 'Exchange failed');
                showToast(`${data.accounts?.length ?? 0} account(s) linked`, 'success');
                await Promise.all([loadAccounts(), loadStatus()]);
              } catch (e) {
                showToast(e.message, 'error');
                await loadStatus();
              } finally {
                setBtnState('link', 'ready');
              }
            },
            onExit: (err) => {
              if (err) showToast(err.display_message || 'Link exited', 'error');
            },
          });

          document.getElementById('link-btn').disabled = false;
        } catch (e) {
          showToast(e.message, 'error');
        }
      }

      document.getElementById('link-btn').addEventListener('click', () => {
        plaidHandler?.open();
      });

      // ── Manual sync ──────────────────────────────────────────────────────
      document.getElementById('sync-btn').addEventListener('click', async () => {
        const log = document.getElementById('sync-log');
        const logEl = document.getElementById('sync-log-inner');
        log.classList.remove('open');
        setBtnState('sync', 'loading', 'Syncing…');

        try {
          const res = await fetch('/api/sync', { method: 'POST' });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || 'Sync failed');

          const lines = data.results.length
            ? data.results.map((r) =>
                r.error
                  ? `<span class="log-err">✕ ${escHtml(r.mapping.account_name)}: ${escHtml(r.error)}</span>`
                  : `<span class="log-ok">✓ ${escHtml(r.mapping.account_name)}</span>` +
                    `<span class="log-dim">  +${r.added} added  ~${r.modified} modified  -${r.removed} removed</span>`
              )
            : [`<span class="log-dim">No accounts to sync.</span>`];

          logEl.innerHTML = lines.join('\n');
          log.classList.add('open');
          showToast('Sync complete', 'success');
          await loadStatus();
        } catch (e) {
          logEl.innerHTML = `<span class="log-err">✕ ${escHtml(e.message)}</span>`;
          log.classList.add('open');
          showToast(e.message, 'error');
          await loadStatus();
        } finally {
          setBtnState('sync', 'ready');
        }
      });

      // ── Refresh mappings ───────────────────────────────────────────────────
      document.getElementById('refresh-btn').addEventListener('click', async () => {
        setBtnState('refresh', 'loading', 'Refreshing…');
        try {
          const res = await fetch('/api/mappings/refresh', { method: 'POST' });
          if (!res.ok) throw new Error('Refresh failed');
          await loadAccounts();
          await loadStatus();
          showToast('Accounts refreshed', 'success');
        } catch (e) {
          showToast(e.message, 'error');
        } finally {
          setBtnState('refresh', 'ready');
        }
      });

      // ── Helpers ──────────────────────────────────────────────────────────
      function setBtnState(which, state, label) {
        const btn = document.getElementById(`${which}-btn`);
        const textEl = document.getElementById(`${which}-btn-text`);
        const loading = state === 'loading';

        btn.disabled = loading;

        if (loading) {
          btn.insertAdjacentHTML(
            'afterbegin',
            '<div class="spinner" id="spinner-' + which + '"></div>'
          );
          if (textEl) textEl.textContent = label;
          if (which === 'refresh') {
            const svg = btn.querySelector('svg');
            if (svg) svg.style.display = 'none';
          }
        } else {
          document.getElementById(`spinner-${which}`)?.remove();
          if (textEl) {
            textEl.textContent = which === 'link' ? 'Link Institution' : 'Sync Now';
          }
          if (which === 'refresh') {
            const svg = btn.querySelector('svg');
            if (svg) svg.style.display = 'block';
          }
        }
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ── Boot ─────────────────────────────────────────────────────────────
      (async () => {
        await Promise.all([loadStatus(), loadAccounts()]);
        setInterval(loadStatus, 5000);
        document.getElementById('refresh-btn').disabled = false;
        document.getElementById('sync-btn').disabled = false;
        await initPlaid();
      })();
    </script>
  </body>
</html>
